spring.application.name=user-svc
server.port=8081

spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# ---------------------------------------------------------------------------
# Tests run against a real Testcontainers PostgreSQL instance.
# create-drop: Hibernate creates the full schema before the test suite and
# drops it after — guaranteeing a clean, reproducible state every run without
# needing migration scripts to be in place yet.
# Use "validate" here once Flyway migrations are added (consistent with prod).
# ---------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=none
spring.datasource.initialize=false
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.sql.init.mode=never

management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoints.web.base-path=/actuator
# In Spring Boot 3, endpoints are usually enabled by default. The new access property controls permission levels. read_only is the standard replacement for "enabled".
management.endpoint.prometheus.access=read_only
management.endpoint.health.show-details=always

# The configuration hierarchy was reorganized to group properties by the monitoring system (Prometheus) rather than the function (metrics.export).
management.prometheus.metrics.export.enabled=true
management.server.port=8081
management.health.db.enabled=false

# Enable histogram buckets
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# Explicitly enable distribution statistics
management.metrics.distribution.slo.http.server.requests=50ms,100ms,200ms,300ms,500ms,1s,2s,5s

management.metrics.distribution.minimum-expected-value.http.server.requests=10ms
management.metrics.distribution.maximum-expected-value.http.server.requests=10s

spring.autoconfigure.exclude=\
org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration